<!doctype html>
<html lang="en">

<head>
   <meta charset="utf-8">
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <title>Portfolio</title>
   <link rel="stylesheet" href="./assets/style.css">
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" rel="stylesheet"
      integrity="sha384-iYQeCzEYFbKjA/T2uDLTpkwGzCiq6soy8tYaI1GyVh/UjpbCx/TYkiZhlZB6+fzT" crossorigin="anonymous">
</head>

<body>
   <div class="container">
      <div class="bg-circle1"></div>
      <div class="bg-circle2"></div>
      <div class="bg-circle3"></div>


      <div class="main-container">
         <div class="row upper-part">
            <div class="col-md-4 d-flex justify-content-center">
               <div class="shape square-shape">
                  <div class="square-content">
                     <h2>About</h2>
                     <button type="button" class="btn btn-outline-dark">know more</button>
                  </div>
               </div>
            </div>
            <div class="col-md-4 d-flex justify-content-center">
               <div class="shape circle-shape">
                  <div class="circle-content">
                     <h2>
                        My CV
                     </h2>
                     <button class="btn btn-outline-dark">View Full CV</button class="">
                  </div>
               </div>
            </div>
            <div class="col-md-4 d-flex justify-content-center">
               <div class="shape d-shape">
                  <div class="d-content">
                     <h2>
                        <span>Social</span><span>Media</span>
                     </h2>
                     <button class="btn btn-outline-dark">know more</button class="">
                  </div>
               </div>
            </div>

         </div>


         <div class="row lower-part">
            <div class="col-md-4 d-flex justify-content-center">
               <div class="shape reverse-d-shape">
                  <div class="reverse-d-content">
                     <h2>Portfolio</h2>
                     <button class="btn btn-outline-dark">know more</button class="">

                  </div>
               </div>
            </div>
            <div class="col-md-4 d-flex justify-content-center">
               <div class="shape reverse-u-shape">
                  <div class="reverse-u-content">
                     <h2>Photos</h2>
                     <button class="btn btn-outline-dark">View More</button class="">

                  </div>
               </div>
            </div>
            <div class="col-md-4 d-flex justify-content-center leaf">
               <div class="shape leaf-shape">
                  <div class="leaf-shape-content">
                     <h2>Contact</h2>
                     <button class="btn btn-outline-dark">know more</button>

                  </div>
               </div>
            </div>

         </div>

      </div>
   </div>












   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-u1OknCvxWvY5kfmNBILK2hRnQC3Pr17a+RTT6rIHI7NnikvbZlHgTPOOmMi466C8"
      crossorigin="anonymous"></script>
</body>

</html>
